<svg width="100%" viewBox="0 0 680 720" role="img" xmlns="http://www.w3.org/2000/svg">
<title>La pensée d'un économiste</title>
<desc>Deux courbes contrastées : une courbe exponentielle ascendante pour la pensée d'un économiste, une ligne plate pour celle d'une agence généraliste.</desc>

<rect x="0" y="0" width="680" height="720" fill="#000"/>

<!-- Section haute : courbe exponentielle -->
<!-- Ligne de base solide -->
<line x1="80" y1="310" x2="580" y2="310" stroke="#fff" stroke-width="1.5"/>

<!-- Courbe exponentielle en pointillés -->
<path d="M 80 308 C 180 306, 300 300, 380 280 C 430 268, 470 240, 500 190 C 520 155, 535 110, 545 60" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="8 5"/>

<!-- Flèche au sommet de la courbe -->
<path d="M 550.7 67.3 L 546.6 52.2 L 537 64.6" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

<!-- Label haut -->
<text x="340" y="380" text-anchor="middle" font-family="'Source Serif 4', Georgia, serif" font-size="18" font-weight="500" fill="#fff" letter-spacing="0.5">LA PENSÉE D'UN ÉCONOMISTE.</text>

<!-- Section basse : ligne plate -->
<!-- Ligne de base solide -->
<line x1="80" y1="560" x2="580" y2="560" stroke="#fff" stroke-width="1.5"/>

<!-- Ligne plate en pointillés -->
<path d="M 80 558 L 560 530" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="8 5"/>

<!-- Flèche au bout de la ligne plate -->
<path d="M 553.4 536.8 L 567 529 L 552.6 522.8" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

<!-- Label bas -->
<text x="340" y="640" text-anchor="middle" font-family="'Source Serif 4', Georgia, serif" font-size="18" font-weight="500" fill="#fff" letter-spacing="0.5">PAS CELLE D'UNE AGENCE GÉNÉRALISTE.</text>

</svg>
